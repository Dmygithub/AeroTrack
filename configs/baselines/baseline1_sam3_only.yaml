# BL1: SAM3-only lower-bound baseline.
# Single session with SAM3 built-in VG detection; no periodic re-detection.
# Note: evaluate.py overrides tracking via configs/categories/<cat>.yaml.
# These defaults apply to demo_video.py only.

baseline: 1

io:
  video: "data/VisDrone-OVTS/sequences/uav0000013_01073_v"
  output: "outputs/videos"
  sam3_ckpt: "checkpoints/sam3.pt"

tracking:
  text: "vehicle"        # Text prompt (comma-separated for multi-class)
  prompt_frame: 0        # Prompt frame index

# SAM3-only tuning (not used by SAM2 baselines BL5/BL6)
sam3_tuning:
  num_maskmem: 2               # Frames kept in SAM3 memory bank
  max_obj_ptrs_in_encoder: 4   # Max object pointers in encoder
